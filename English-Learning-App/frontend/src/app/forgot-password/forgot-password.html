<div class="login-page">
  <canvas #bgCanvas class="bg-canvas"></canvas>

  <div class="login-card">
    <div class="card-header">
      <div class="logo-icon">🔑</div>
      <span class="app-label">WordLearn</span>
      <h1>Forgot Password</h1>
      
      <p style="color: rgba(255,255,255,0.6); font-size: 14px; margin-top: 8px;">
        {{ step === 1 ? 'Email жіберіңіз, пароль қалпына келтіру кодын жібереміз' : 'Почтаңызға келген 6 таңбалы кодты және жаңа парольді жазыңыз' }}
      </p>
    </div>

    <form (ngSubmit)="onSubmit()">
      
      <div class="input-box" *ngIf="step === 1">
        <input type="email" placeholder="Email" required
               [(ngModel)]="email" name="email">
        <i class="fa-regular fa-envelope"></i>
      </div>

      <div *ngIf="step === 2">
        <div class="input-box">
          <input type="text" placeholder="6-таңбалы код" required
                 [(ngModel)]="verificationCode" name="verificationCode">
          <i class="fa-solid fa-shield-halved"></i>
        </div>

        <div class="input-box">
          <input type="password" placeholder="Жаңа пароль" required
                 [(ngModel)]="newPassword" name="newPassword">
          <i class="fa-solid fa-lock"></i>
        </div>
      </div>

      <div class="error-message" *ngIf="errorMessage">⚠️ {{ errorMessage }}</div>
      <div class="success-message" *ngIf="successMessage">✅ {{ successMessage }}</div>

      <button type="submit" class="button" [disabled]="isLoading">
        <span *ngIf="isLoading">Жүктелуде...</span>
        <span *ngIf="!isLoading">
          {{ step === 1 ? 'Send Reset Code' : 'Update Password' }}
        </span>
      </button>

      <div class="register-link">
        <p><a routerLink="/">← Back to Login</a></p>
      </div>
    </form>
  </div>
</div>
